name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install deps without running lifecycle scripts (prisma generate runs below)
      - run: npm ci

      # Regenerate the Prisma client so tsc sees the correct generated types
      - run: npx prisma generate

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint
